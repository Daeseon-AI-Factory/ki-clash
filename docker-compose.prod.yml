# Production overrides for AWS EC2 single-instance deployment.
# Compose merges this on top of docker-compose.yml when you run:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Or run this file alone (it defines the full prod stack):
#   docker compose -f docker-compose.prod.yml up -d
#
# Key differences from the dev compose:
#   - api command runs alembic upgrade then uvicorn WITHOUT --reload
#   - All services use restart: unless-stopped (survives reboot)
#   - Caddy added for automatic Let's Encrypt SSL + reverse proxy
#   - Postgres + Redis persist via named volumes
#   - Secrets sourced from .env (NOT committed)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEBUG: "false"
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS}
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_AD_FREE_PRICE_ID: ${STRIPE_AD_FREE_PRICE_ID:-}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Go game server — full PvP game loop (engine + session + pub/sub).
  # Reads/writes the SAME Redis state as the Python api service, so a
  # single match can be served by either runtime (DR-15 stateless workers).
  # The Caddyfile routes /api/v1/ws/game/* to this service; everything else
  # (auth, rooms, matchmaking, REST) stays on Python.
  game:
    build: ./go-server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "8001"
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: production
      RELEASE: ${RELEASE:-prod}
    expose:
      - "8001"
    healthcheck:
      # distroless image has no wget/curl/shell — the Go binary self-checks.
      test: ["CMD", "/ki-clash-go", "-healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      game:
        condition: service_healthy
    environment:
      # Caddyfile reads {$API_DOMAIN} for the Let's Encrypt cert domain.
      # Without this the container fell back to the hardcoded default.
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
