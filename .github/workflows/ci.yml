name: CI

# Runs on every push to main and every PR. Each job is a merge gate —
# a red X here means the change broke tests/build (the safety net that the
# manual + Vercel-auto-deploy flow was missing).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}  # allow manual "Run workflow" → re-deploy on demand

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: engine, services, schemas (unit). Integration tests auto-skip
  #    when the live stack isn't running (tests/integration/conftest.py). ──
  python-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ki_clash
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ki_clash
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-not-for-production
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Migrate
        run: alembic upgrade head
      - name: Test
        run: pytest -q

  # ── Go: game engine + session unit tests (no external deps). ──
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go-server/go.sum
      - name: Test
        working-directory: go-server
        run: go test ./...

  # ── Web: typecheck + production build (catches the TS/build breakage that
  #    bit us repeatedly during the PixiJS work). ──
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npx tsc --noEmit
      - name: Build
        working-directory: web
        run: npm run build

  # ── Mobile: typecheck + iOS JS bundle export. This catches App Store-facing
  #    route/import/env regressions without requiring Apple credentials. ──
  mobile-check:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: https://api.jjan.daeseon.ai
      EXPO_PUBLIC_WS_URL: wss://api.jjan.daeseon.ai
      EXPO_PUBLIC_WEB_URL: https://jjan.daeseon.ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        working-directory: mobile
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npm run typecheck
      - name: Export iOS bundle
        working-directory: mobile
        run: npx expo export --platform ios --output-dir /tmp/ki-clash-mobile-ios-export

  # ── Web/mobile online parity: prevents the web room/PvP flow from moving
  #    ahead while mobile keeps stale APIs, routes, or analytics. ──
  online-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check online parity
        run: node scripts/check-online-parity.mjs

  # ── Launch marketing: keeps the public promo links, UTM capture, and
  #    share surfaces from drifting while launch content changes quickly. ──
  launch-marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check launch marketing links
        run: node scripts/check-launch-marketing.mjs

  # ── Backend CD: on every push to main (after Python+Go gates pass), SSH into
  #    the NCP server and redeploy the backend stack. This is the root fix that
  #    replaces manual `ssh + git pull + docker compose` after every change.
  #
  #    Connects by DOMAIN, not IP — the NCP box's IP changes, but the API
  #    domain's DNS always tracks the current host, so this survives IP churn.
  #    NCP_HOST defaults to api.jjan.daeseon.ai; override only if the SSH host
  #    differs from the API domain.
  #
  #    No-ops (does NOT fail CI) until these secrets are configured:
  #      NCP_USER       the SSH user that owns the cloned repo
  #      NCP_SSH_KEY    the matching PRIVATE key (full PEM/OpenSSH text)
  #      NCP_HOST       (optional) SSH host/domain; default api.jjan.daeseon.ai
  #    Also runnable on demand via the Actions tab → "Run workflow". ──
  deploy-backend:
    needs: [python-test, go-test]
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-backend-main
      cancel-in-progress: false
    steps:
      - name: Deploy to NCP over SSH
        env:
          NCP_HOST: ${{ secrets.NCP_HOST || 'api.jjan.daeseon.ai' }}
          NCP_USER: ${{ secrets.NCP_USER }}
          NCP_SSH_KEY: ${{ secrets.NCP_SSH_KEY }}
        run: |
          if [ -z "$NCP_USER" ] || [ -z "$NCP_SSH_KEY" ]; then
            echo "::warning::NCP_USER/NCP_SSH_KEY not set — skipping backend deploy. Host defaults to api.jjan.daeseon.ai (DNS follows IP changes). Add the secrets in Settings → Secrets → Actions to enable CD."
            exit 0
          fi
          echo "Deploying to $NCP_USER@$NCP_HOST (resolves to $(getent hosts "$NCP_HOST" | awk '{print $1}' | head -1 || echo '?'))"
          mkdir -p ~/.ssh
          printf '%s\n' "$NCP_SSH_KEY" > ~/.ssh/ncp_deploy
          chmod 600 ~/.ssh/ncp_deploy
          ssh-keyscan -H "$NCP_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/ncp_deploy -o StrictHostKeyChecking=accept-new "$NCP_USER@$NCP_HOST" '
            set -euo pipefail
            CF=$(find ~ /root /home /srv /opt -maxdepth 4 -name docker-compose.naver.yml 2>/dev/null | head -1)
            test -n "$CF" || { echo "docker-compose.naver.yml not found on server"; exit 1; }
            cd "$(dirname "$CF")"
            echo "repo: $(pwd)  before: $(git rev-parse --short HEAD)"
            git pull --ff-only
            echo "after: $(git rev-parse --short HEAD)"
            COMPOSE_PROJECT_NAME=jjan docker compose -f docker-compose.naver.yml up -d --build
            COMPOSE_PROJECT_NAME=jjan docker compose -f docker-compose.naver.yml ps
          '
